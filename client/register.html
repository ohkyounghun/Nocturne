<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Nocturne</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header / Nav -->
<header class="header">
    <a href="index.html" class="logo">NOCTURNE</a>
</header>

<!-- Register Form -->
<main class="auth-container">
    <h1>Register</h1>

    <form class="auth-form" id="register-form">

        <!-- Username -->
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your nickname" required>

        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@email.com" required>

        <!-- Password -->
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="········" required>

        <!-- Confirm Password -->
        <label for="password-confirm">Confirm Password</label>
        <input type="password" id="password-confirm" placeholder="········" required>

        <button type="submit" id="btn-register">Register</button>

    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>

</main>

<!-- Scripts -->
<script type="module" src="js/register.js"></script>

</body>
</html>
